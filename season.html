<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Four Seasons Animation</title>
    <style>
        :root {
            --bgd-color: #cbe9f4;
            --light: #93d5eb;
            --medium: #66bbd8;
            --dark: #4da2bb;
            --bush: #ffffff;
            --trunk: #c2653c;
            --trunk2: #9d5d5d;
            --cloud: #ffffff;
            --sun: transparent;
            --rabbit: #ffffff;
        }

        *,
        *:before,
        *:after {
            transition: 2s ease background;
            position: absolute;
            box-sizing: border-box;
        }

        body {
            padding: 0;
            margin: 0;
            overflow: hidden;
            background-color: var(--bgd-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .container {
            position: relative;
            width: 800px;
            height: 450px;
        }

        .sun {
            background-color: var(--sun);
            width: 60px;
            height: 60px;
            border-radius: 100%;
            top: -20px;
            left: 180px;
        }

        /* Rainbow */
        .rainbow {
            visibility: hidden;
            width: 600px;
            height: 270px;
            bottom: 82px;
            left: 50%;
            transform: translateX(-50%);
        }

        .rainbow.animated {
            animation: rainbow 14s linear;
            visibility: visible;
        }

        .rainbow .rainbow-colour {
            border-top-left-radius: 50% 100%;
            border-top-right-radius: 50% 100%;
            left: 50%;
            transform: translate(-50%, 0);
            transform-origin: 0 100%;
            bottom: 0;
            border-bottom: 0 !important;
        }

        .rainbow .rainbow-colour:nth-child(1) {
            border: 10px solid #ac01fd;
            height: 100%;
            width: 100%;
        }

        .rainbow .rainbow-colour:nth-child(2) {
            border: 10px solid #511ce0;
            height: 261px;
            width: 581px;
        }

        .rainbow .rainbow-colour:nth-child(3) {
            border: 10px solid #1a9fe2;
            height: 252px;
            width: 562px;
        }

        .rainbow .rainbow-colour:nth-child(4) {
            border: 10px solid #5ed81d;
            height: 243px;
            width: 543px;
        }

        .rainbow .rainbow-colour:nth-child(5) {
            border: 10px solid #f8f52a;
            height: 234px;
            width: 524px;
        }

        .rainbow .rainbow-colour:nth-child(6) {
            border: 10px solid #f7a528;
            height: 225px;
            width: 505px;
        }

        .rainbow .rainbow-colour:nth-child(7) {
            border: 10px solid #f63b2a;
            height: 216px;
            width: 486px;
        }

        @keyframes rainbow {
            0% {
                opacity: 0;
            }

            10% {
                opacity: 0.5;
            }

            80% {
                opacity: 0.5;
            }

            100% {
                opacity: 0;
            }
        }

        /* Clouds & Weather */
        .cloud-group {
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        .cloud {
            background-color: var(--cloud);
            width: 80px;
            height: 30px;
            border-radius: 50px;
            left: 50px;
            top: 40px;
            animation: clouds 10s linear infinite;
        }

        .cloud:nth-child(2) {
            left: 70px;
            top: 65px;
            width: 90px;
        }

        .cloud:nth-child(3) {
            left: 330px;
            top: 30px;
            width: 80px;
            height: 25px;
        }

        .cloud:nth-child(4) {
            left: 290px;
            top: 60px;
            width: 90px;
        }

        .cloud:nth-child(5) {
            left: 480px;
            top: 40px;
            width: 100px;
        }

        .cloud:nth-child(6) {
            left: 580px;
            top: 80px;
        }

        .cloud:nth-child(7) {
            left: 520px;
            top: 105px;
            width: 110px;
        }

        .cloud:nth-child(8) {
            left: 660px;
            top: 160px;
            width: 70px;
        }

        @keyframes clouds {
            50% {
                transform: translateX(20px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .weather-container {
            width: 100%;
            height: 400px;
        }

        .snow {
            opacity: 0;
            background-color: #ffffff;
            width: 6px;
            height: 6px;
            border-radius: 100%;
            transition: 2s ease all;
            animation: snow 5s linear infinite;
        }

        .rain {
            opacity: 0;
            display: none;
            background-color: #eaf9fe;
            width: 4px;
            height: 8px;
            transform: rotate(-30deg);
            border-color: #eaf9fe;
            border-radius: 50% 0 50% 50%;
            transition: 2s ease all;
            animation: drops 1s linear infinite;
        }

        @keyframes drops {
            0% {
                opacity: 0;
                transform: translate3d(0, 0, 0);
            }

            5% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                transform: translate3d(20px, 200px, 0);
                opacity: 0;
            }
        }

        @keyframes snow {
            0% {
                margin-top: 0px;
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            50% {
                opacity: 1;
                margin-left: 20px;
            }

            100% {
                margin-top: 200px;
                opacity: 0;
            }
        }

        /* Base & Bushes */
        .base {
            width: 650px;
            height: 20px;
            background-color: var(--bush);
            border-radius: 20px;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .bush-group {
            width: 100%;
            height: 100%;
            bottom: 5px;
            left: 0;
        }

        .bush {
            z-index: 100;
            width: 90px;
            height: 40px;
            bottom: 0;
            left: 0;
            background-color: var(--bush);
            border-radius: 50px 50px 0 0;
        }

        .bush:nth-child(2) {
            left: 70px;
        }

        .bush:nth-child(3) {
            left: 140px;
        }

        .bush:nth-child(4) {
            left: 210px;
        }

        .bush:nth-child(5) {
            left: 280px;
        }

        .bush:nth-child(6) {
            left: 350px;
        }

        .bush:nth-child(7) {
            left: 420px;
        }

        .bush:nth-child(8) {
            left: 490px;
        }

        .bush:nth-child(9) {
            left: 560px;
        }

        /* Trees */
        .tree-group {
            width: 100%;
            height: 350px;
            bottom: 0;
            left: 0;
        }

        .tree {
            z-index: 1;
            bottom: 10px;
            width: 5px;
            height: 50px;
            left: 10px;
        }

        .tree .trunk {
            background-color: var(--trunk);
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .tree:nth-child(1) .trunk,
        .tree:nth-child(2) .trunk,
        .tree:nth-child(3) .trunk,
        .tree:nth-child(6) .trunk,
        .tree:nth-child(7) .trunk,
        .tree:nth-child(8) .trunk,
        .tree:nth-child(11) .trunk,
        .tree:nth-child(12) .trunk {
            background-color: var(--trunk2);
        }

        .tree .tree-top {
            background-color: var(--dark);
            border-radius: 100%;
            top: -30px;
            width: 40px;
            height: 40px;
            left: -20px;
        }

        .tree .tree-top:after {
            content: "";
            position: absolute;
            width: 80%;
            height: 80%;
            top: 5%;
            right: 5%;
            background-color: var(--medium);
            border-radius: 100%;
        }

        .branch {
            z-index: -1;
            height: 10px;
            width: 40px;
            border-radius: 10px;
            background-color: var(--dark);
            transform: rotate(30deg);
            transform-origin: 0% 0%;
            left: 5px;
        }

        .branch-two {
            top: 70px;
            height: 20px;
            width: 40px;
            border-radius: 0 0 20px 0;
            border: 7px solid var(--trunk);
            border-left: 0;
            border-top: 0;
        }

        .branch-two .tree-top {
            width: 50px;
            height: 20px;
            top: -10px;
            left: 20px;
        }

        .tree:nth-child(2) {
            left: 40px;
            height: 70px;
            width: 6px;
            z-index: 2;
        }

        .tree:nth-child(2) .tree-top {
            background-color: var(--medium);
            top: -35px;
            width: 50px;
            height: 50px;
            left: -23px;
        }

        .tree:nth-child(2) .tree-top:after {
            background-color: var(--light);
        }

        .tree:nth-child(3) {
            left: 80px;
            height: 50px;
        }

        .tree:nth-child(3) .tree-top {
            background-color: var(--medium);
            top: -15px;
            width: 30px;
            height: 30px;
            left: -13px;
        }

        .tree:nth-child(3) .tree-top:after {
            background-color: var(--light);
        }

        .tree:nth-child(4) {
            z-index: 1;
            left: 105px;
            height: 220px;
            width: 10px;
        }

        .tree:nth-child(4) .branch:before {
            content: "";
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: var(--medium);
            border-radius: 10px;
        }

        .tree:nth-child(4) .branch:after {
            content: "";
            z-index: 1;
            left: 0;
            top: 0;
            width: 66%;
            height: 100%;
            background-color: var(--light);
            border-radius: 10px;
        }

        .tree:nth-child(4) .branch:nth-child(7),
        .tree:nth-child(4) .branch:nth-child(8),
        .tree:nth-child(4) .branch:nth-child(9),
        .tree:nth-child(4) .branch:nth-child(10),
        .tree:nth-child(4) .branch:nth-child(11),
        .tree:nth-child(4) .branch:nth-child(12) {

            top: 7px;
            left: 10px;
        }

        .tree:nth-child(4) .branch:nth-child(5):before,
        .tree:nth-child(4) .branch:nth-child(6):before,
        .tree:nth-child(4) .branch:nth-child(11):before,
        .tree:nth-child(4) .branch:nth-child(12):before {
            width: 66%;
        }

        .tree:nth-child(4) .branch:nth-child(5):after,
        .tree:nth-child(4) .branch:nth-child(6):after,
        .tree:nth-child(4) .branch:nth-child(11):after,
        .tree:nth-child(4) .branch:nth-child(12):after {
            width: 33%;
        }

        .tree:nth-child(4) .branch:nth-child(3):before,
        .tree:nth-child(4) .branch:nth-child(4):before,
        .tree:nth-child(4) .branch:nth-child(9):before,
        .tree:nth-child(4) .branch:nth-child(10):before {
            width: 100%;

        .tree:nth-child(4) .branch:nth-child(3):after,
        .tree:nth-child(4) .branch:nth-child(4):after,
        .tree:nth-child(4) .branch:nth-child(9):after,
        .tree:nth-child(4) .branch:nth-child(10):after {
            width: 55%;
        }

        .tree:nth-child(4) .branch:first-child {
            top: 0px;
            width: 40px;
        }

        .tree:nth-child(4) .branch:nth-child(2) {
            top: 25px;
            width: 50px;
        }

        .tree:nth-child(4) .branch:nth-child(3) {

        }

        .tree:nth-child(4) .branch:nth-child(4) {

        }

        .tree:nth-child(4) .branch:nth-child(5) {

        }

        .tree:nth-child(4) .branch:nth-child(6) {

        }

        .tree:nth-child(4) .branch:nth-child(7) {
            top: 8px;
            width: 40px;
        }

        .tree:nth-child(4) .branch:nth-child(8) {
            top: 33px;
            width: 50px;
        }

        .tree:nth-child(4) .branch:nth-child(9) {
            top: 58px;
            width: 60px;
        }

        .tree:nth-child(4) .branch:nth-child(10) {
            top: 83px;
            width: 70px;
        }

        .tree:nth-child(4) .branch:nth-child(11) {
            top: 108px;
            width: 80px;
        }

        .tree:nth-child(4) .branch:nth-child(12) {
            top: 133px;
            width: 90px;
        }

        .tree:nth-child(5) {
            left: 140px;
            height: 280px;
            width: 12px;
        }

        .tree:nth-child(5) .tree-top {
            z-index: 3;
            background-color: var(--medium);
            top: -25px;
            width: 120px;
            height: 40px;
            left: -55px;
            border-radius: 50px;
        }

        .tree:nth-child(5) .tree-top:after {
            border-radius: 50px 50px 0 0px;
            background-color: var(--light);
            width: 100%;
            left: 0;

        }

        .tree:nth-child(5) .branch-two:nth-child(5) {
            top: 38px;

            border-radius: 0 0 20px 0;
            border: 8px solid var(--trunk);

        }

        .tree:nth-child(5) .branch-two:nth-child(5) .tree-top {

        }

        .tree:nth-child(5) .branch-two:nth-child(6) .tree-top {

        .tree:nth-child(5) .branch-two:nth-child(4) {

        .tree:nth-child(5) .branch-two:nth-child(4) .tree-top {

        .tree:nth-child(5) .tree-top:nth-child(2) {

        }

        .tree:nth-child(6) {

        }

        .tree:nth-child(6) .tree-top {

            cursor: pointer;

            50%,
            80%,
            100% {

<body>
    <h1 class="greeting-text">Sandy 女神节快乐</h1>
    <h2 class="date-text" id="current-date"></h2>
    <div class="scroll-prompt" onclick="window.location.href='index.html'">向下滚动鼠标或点击查看首页 ⬇️</div>
    <div class="container">
        <div class="season"></div>
        <div class="sun"></div>
        <div class="rainbow">
            <div class="rainbow-colour"></div>
            <div class="rainbow-colour"></div>
            <div class="rainbow-colour"></div>
            <div class="rainbow-colour"></div>
            <div class="rainbow-colour"></div>
            <div class="rainbow-colour"></div>
            <div class="rainbow-colour"></div>
        </div>

        <div class="cloud-group" id="clouds">
            <!-- DOM elements injected dynamically by JS setup to replace repetitive Pug Loops -->
        </div>

        <div class="base">
            <div class="bush-group">
                <div class="bush"></div>
                <div class="bush"></div>
                <div class="bush"></div>
                <div class="bush"></div>
                <div class="bush"></div>
                <div class="bush"></div>
                <div class="bush"></div>
                <div class="bush"></div>
                <div class="bush"></div>
            </div>

            <div class="rabbit animated">
                <div class="head">
                    <div class="ear"></div>
                    <div class="ear"></div>
                </div>
            </div>

            <div class="tree-group" id="trees">
                <!-- Standard layout of Trees (Trees 1 - 15) generated instantly to mimic compiled code cleanly -->
            </div>
        </div>
    </div>

    <script>
        // =============== PRE-PROCESSOR GENERATOR =============== 
        // This cleanly builds the massive loops from original SCSS & Pug (Snow, Rain, Cones, Trees)
        // This eliminates ~2000 lines of hardcoded random CSS & DOM elements for you while preserving logic.
        const injectCSS = (cssStr) => { const style = document.createElement('style'); style.innerHTML = cssStr; document.head.appendChild(style); };
        let cssBuilder = "";

        // 1. Weather Setup
        let cloudHTML = "";
        for (let i = 1; i <= 8; i++) {
            let weatherHTML = `<div class="weather-container">`;
            for (let j = 1; j <= 20; j++) weatherHTML += `<div class="snow"></div>`;
            for (let k = 1; k <= 30; k++) weatherHTML += `<div class="rain"></div>`;
            weatherHTML += `</div>`;
            cloudHTML += `<div class="cloud">${weatherHTML}</div>`;
        }
        document.getElementById('clouds').innerHTML = cloudHTML;

        // 2. Weather Pseudo-Random SCSS Flattening
        for (let i = 1; i <= 20; i++) cssBuilder += `.snow:nth-of-type(${i}) { top: ${Math.floor(Math.random() * 30)}px; left: ${Math.floor(Math.random() * 70)}px; animation-delay: ${Math.floor(Math.random() * 10)}s; }\n`;
        for (let i = 1; i <= 30; i++) cssBuilder += `.rain:nth-of-type(${i + 20}) { top: ${Math.floor(Math.random() * 30)}px; left: ${Math.floor(Math.random() * 70)}px; animation-delay: ${0.1 * i}s; }\n`; // Notice offset to match CSS node counting

        // 3. Tree DOM Generation
        let treeHTML = "";
        const getCones = (count) => { let h = ''; for (let c = 1; c <= count; c++) h += `<div class="cone"></div>`; return h; };
        const getFlower = () => `<div class="flower"><div class="flower-in"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div></div>`;

        // Tree 1-3
        for (let i = 1; i <= 3; i++) treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top"></div></div>`;
        // Tree 4
        treeHTML += `<div class="tree"><div class="trunk"></div>`;
        for (let b = 1; b <= 12; b++) treeHTML += `<div class="branch"></div>`;
        treeHTML += `</div>`;
        // Tree 5
        treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top"></div><div class="tree-top"></div><div class="branch-two"><div class="tree-top"></div></div><div class="branch-two"><div class="tree-top"></div></div><div class="branch-two"><div class="tree-top"></div></div></div>`;
        // Tree 6-7
        for (let i = 6; i <= 7; i++) treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top"></div></div>`;
        // Tree 8
        treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top">${getCones(20)}</div><div class="tree-top"></div><div class="tree-top"></div>${getFlower()}${getFlower()}</div>`;
        // Tree 9
        treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top"></div></div>`;
        // Tree 10
        treeHTML += `<div class="tree"><div class="trunk"></div>`;
        for (let b = 1; b <= 10; b++) {
            treeHTML += `<div class="branch"><div class="branch-in"></div><div class="pine-cone-row">`;
            for (let p = 1; p <= 7; p++) treeHTML += `<div class="pine-cone"></div>`;
            treeHTML += `</div></div>`;
        }
        treeHTML += `</div>`;
        // Tree 11
        treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top"></div><div class="tree-top"></div><div class="tree-top"></div></div>`;
        // Tree 12
        treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top">${getCones(20)}</div><div class="tree-top"></div><div class="tree-top"></div>${getFlower()}${getFlower()}</div>`;
        // Tree 13
        treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top"></div><div class="tree-top"></div><div class="tree-top"></div><div class="branch-two"><div class="tree-top"></div></div><div class="branch-two"><div class="tree-top"></div></div></div>`;
        // Tree 14
        treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top">${getCones(20)}</div><div class="tree-top">${getCones(20)}</div><div class="tree-top">${getCones(20)}</div></div>`;
        // Tree 15
        treeHTML += `<div class="tree"><div class="trunk"></div><div class="tree-top">${getCones(20)}</div><div class="tree-top">${getCones(20)}</div><div class="tree-top">${getCones(40)}</div></div>`;

        document.getElementById('trees').innerHTML = treeHTML;

        // 4. Random Cones SCSS Flattening
        for (let i = 1; i <= 40; i++) cssBuilder += `.cone:nth-of-type(${i}) { top: ${Math.floor(Math.random() * 90)}px; left: ${Math.floor(Math.random() * 90)}px; }\n`;
        for (let i = 1; i <= 12; i++) {
            let off = 15 + ((i - 1) * 10);
            cssBuilder += `.tree:nth-child(10) .pine-cone:nth-child(${i}) { left: ${off}px; }\n`;
            cssBuilder += `.tree:nth-child(10) .branch:nth-child(7) .pine-cone:nth-child(${i}), .tree:nth-child(10) .branch:nth-child(8) .pine-cone:nth-child(${i}), .tree:nth-child(10) .branch:nth-child(9) .pine-cone:nth-child(${i}), .tree:nth-child(10) .branch:nth-child(10) .pine-cone:nth-child(${i}), .tree:nth-child(10) .branch:nth-child(11) .pine-cone:nth-child(${i}) { left: ${off + 1}px; }\n`;
        }
        injectCSS(cssBuilder);


        // =============== MAIN ANIMATION LOGIC =============== 
        var html = document.getElementsByTagName("html")[0];
        var sun = document.querySelector(".sun");
        var rainbow = document.querySelector(".rainbow");
        var rabbit = document.querySelector(".rabbit");
        var snow = document.querySelectorAll(".snow");
        var rain = document.querySelectorAll(".rain");
        var flowers = document.querySelectorAll(".flower");

        var lightColours = ["#93d5eb", "#add63a", "#c5d63a", "#febe42"],
            mediumColours = ["#66bbd8", "#92c938", "#acc52b", "#ff9d25"],
            darkColours = ["#4da2bb", "#2a9d5c", "#89a503", "#ff6b2f"],
            backgroundColours = ["#cbe9f4", "#daf8ff", "#feec98", "#ffdc8a"],
            bushColours = ["#ffffff", "#3ebf6d", "#99b31a", "#fd6d2e"],
            cloudColours = ["#ffffff", "#ffffff", "#ffffff", "#eaf9fe"],
            seasons = ["Winter", "Spring", "Summer", "Autumn"];
        var c = 1;
        var season;

        function updateSeasons() {
            html.style.setProperty("--bgd-color", backgroundColours[c]);
            html.style.setProperty("--light", lightColours[c]);
            html.style.setProperty("--medium", mediumColours[c]);
            html.style.setProperty("--dark", darkColours[c]);
            html.style.setProperty("--bush", bushColours[c]);
            html.style.setProperty("--cloud", cloudColours[c]);
            season = seasons[c];

            snow.forEach(function (el) {
                season !== seasons[0] ? (el.style.display = "none") : (el.style.display = "block");
            });

            if (season === seasons[0] || season === seasons[2]) {
                rabbit.classList.add("animated");
            } else {
                rabbit.classList.remove("animated");
            }

            season === seasons[1] ? rainbow.classList.add("animated") : rainbow.classList.remove("animated");
            if (season === seasons[1]) {
                html.style.setProperty("--rabbit", "#9E6255");
            }

            flowers.forEach(function (el) {
                season === seasons[1] ? el.classList.add("animated") : el.classList.remove("animated");
            });

            if (season === seasons[2]) {
                html.style.setProperty("--sun", "#ffb53a");
                html.style.setProperty("--rabbit", "#9E6255");
            } else {
                html.style.setProperty("--sun", "transparent");
                html.style.setProperty("--rabbit", "#ffffff");
            }

            rain.forEach(function (el) {
                season === seasons[3] ? (el.style.display = "block") : (el.style.display = "none");
            });

            c = (c + 1) % seasons.length;
        }

        // Ensure first initialization reflects Winter state cleanly:
        updateSeasons();
        c = 1; // Reset to spring for next tick

        // Setup Date
        const dateElement = document.getElementById('current-date');
        const today = new Date();
        const dateString = today.getFullYear() + '年' + (today.getMonth() + 1) + '月' + today.getDate() + '日';
        dateElement.innerText = dateString;

        // Setup Scroll Event to redirect
        window.addEventListener('wheel', function (e) {
            if (e.deltaY > 0) {
                window.location.href = 'index.html';
            }
        });

        // Touch support for scrolling down
        let startY = 0;
        window.addEventListener('touchstart', e => startY = e.touches[0].clientY);
        window.addEventListener('touchmove', e => {
            if (startY > e.touches[0].clientY + 50) {
                window.location.href = 'index.html';
            }
        });

        let nF = 0;
        function animate() {
            if (++nF % 300 === 0) {
                updateSeasons();
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
